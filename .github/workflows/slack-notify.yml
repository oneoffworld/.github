name: Slack PR Check Notification

on:
  workflow_call:
    secrets:
      SLACK_BOT_TOKEN:
        required: true

concurrency:
  group: slack-notify-${{ github.event.check_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  notify:
    if: contains(github.event.check_run.name, 'CodeRabbit') && github.event.check_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
        run: |
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
          echo "title=$(echo "$PR_DATA" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_DATA" | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
          echo "base=$(echo "$PR_DATA" | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"
          echo "head=$(echo "$PR_DATA" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "author=$(echo "$PR_DATA" | jq -r '.user.login')" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_BASE: ${{ steps.pr.outputs.base }}
          PR_HEAD: ${{ steps.pr.outputs.head }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          REPO: ${{ github.repository }}
          CODERABBIT_CONCLUSION: ${{ github.event.check_run.conclusion }}
        run: |
          case "$CODERABBIT_CONCLUSION" in
            success)   EMOJI="✅"; STATUS="passed" ;;
            failure)   EMOJI="❌"; STATUS="failed" ;;
            timed_out) EMOJI="⏰"; STATUS="timed out" ;;
            cancelled) EMOJI="🚫"; STATUS="cancelled" ;;
            neutral)   EMOJI="➖"; STATUS="neutral" ;;
            skipped)   EMOJI="⏭️"; STATUS="skipped" ;;
            *)         EMOJI="⚠️"; STATUS="$CODERABBIT_CONCLUSION" ;;
          esac
          case "$PR_AUTHOR" in
            adam-oneoff) SLACK_USER="U0AFK0X90ET" ;;
            bkoc)        SLACK_USER="U099WFQSEG5" ;;
            alexhatzo)   SLACK_USER="U0AFTQS6RGF" ;;
            *)           echo "⚠️ No Slack mapping for $PR_AUTHOR — skipping DM"; exit 0 ;;
          esac
          SLACK_MENTION="<@${SLACK_USER}>"
          TEXT="${EMOJI} CodeRabbit ${STATUS} on PR #${PR_NUMBER} → \`${PR_BASE}\`"
          MRKDWN=$(printf '%s *CodeRabbit %s*\n*Repo:* `%s`\n*PR:* <%s|#%s — %s>\n*Branch:* `%s` → `%s`\n*Author:* %s' \
            "$EMOJI" "$STATUS" "$REPO" "$PR_URL" "$PR_NUMBER" "$PR_TITLE" "$PR_HEAD" "$PR_BASE" "$SLACK_MENTION")
          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_USER" \
            --arg text "$TEXT" \
            --arg mrkdwn "$MRKDWN" \
            '{channel: $channel, text: $text, blocks: [{type: "section", text: {type: "mrkdwn", text: $mrkdwn}}]}')
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$PAYLOAD"
