name: Slack Deploy Notification

on:
  workflow_call:
    secrets:
      SLACK_BOT_TOKEN:
        required: true

jobs:
  deploy-notify:
    if: >-
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base.ref == github.event.repository.default_branch ||
       (github.repository == 'oneoffworld/oneoff-api' && github.event.pull_request.base.ref == 'staging'))
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$REPO" = "oneoffworld/oneoff-api" ] && [ "${{ github.event.pull_request.base.ref }}" = "staging" ]; then
            TEXT="🚀 Deploying \`${REPO}\` to staging"
          else
            TEXT="🚀 Deploying \`${REPO}\`"
          fi
          PAYLOAD=$(jq -n \
            --arg channel "C0ALVSHHAGY" \
            --arg text "$TEXT" \
            '{channel: $channel, text: $text, blocks: [{type: "section", text: {type: "mrkdwn", text: $text}}]}')
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$PAYLOAD"
